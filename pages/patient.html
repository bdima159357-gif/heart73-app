<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Личный кабинет пациента | Сердце под защитой</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/patient.css">

</head>

<body>

<header class="header">

    <div class="container">

        <div class="logo-area">

            <img src="../assets/images/logo.jpg" alt="Сердце под защитой">

            <div>

                <h2>Сердце под защитой</h2>

                <span>На страже вашего здоровья</span>

            </div>

        </div>

        <div class="user">

            <span id="patientName">
                Загрузка...
            </span>

            <button id="logoutButton">
                Выйти
            </button>

        </div>

    </div>

</header>

<main class="container">

    <section class="welcome">

        <h1>

            Добро пожаловать 👋

        </h1>

        <p>

            Выберите необходимую услугу или продолжите уже созданную консультацию.

        </p>

    </section>

    <section class="actions">

        <button id="newChatButton">

            💬 Новая консультация (чат)

        </button>

        <button id="newVideoButton">

            📹 Новая видеоконсультация

        </button>

    </section>

    <section class="consultations">

        <h2>

            Мои консультации

        </h2>

        <div id="consultationsList">

            <div class="loading">

                Загрузка консультаций...

            </div>

        </div>

    </section>

    <section class="documents">

        <h2>

            Заключения врача

        </h2>

        <div id="documentsList">

            Пока заключений нет.

        </div>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/config.js"></script>

<script src="../js/supabase.js"></script>

<script src="../js/api.js"></script>

<script src="../js/patient.js"></script>

</body>

</html>
