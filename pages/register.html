<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Регистрация | Сердце под защитой</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="background"></div>

<div class="login">

<div class="card">

<img src="../assets/images/logo.jpg" class="logo" alt="Логотип">

<h1>Создание аккаунта</h1>

<p class="subtitle">

Заполните данные для регистрации личного кабинета.

</p>

<form id="registerForm">

<div class="input-group">

<label>Имя и фамилия</label>

<input
type="text"
id="name"
placeholder="Иван Иванов"
required>

</div>

<div class="input-group">

<label>Телефон</label>

<input
type="tel"
id="phone"
placeholder="+7 (999) 123-45-67"
required>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="example@mail.ru"
required>

</div>

<div class="input-group">

<label>Пароль</label>

<input
type="password"
id="password"
placeholder="Минимум 6 символов"
required>

</div>

<div class="input-group">

<label>Повторите пароль</label>

<input
type="password"
id="password2"
placeholder="Повторите пароль"
required>

</div>

<div style="margin:20px 0; display:flex; align-items:flex-start; gap:10px;">

<input
type="checkbox"
id="agree"
required
style="width:18px;height:18px;margin-top:3px;">

<label for="agree" style="font-size:14px;line-height:1.5;color:#666;cursor:pointer;">

Я принимаю условия обработки персональных данных.

</label>

</div>

<button type="submit">

Создать аккаунт

</button>

</form>

<div class="links">

<a href="login.html">

← Уже есть аккаунт? Войти

</a>

</div>

<div class="divider"></div>

<div class="advantages">

<div class="adv">

🔒

<span>Данные надежно защищены</span>

</div>

<div class="adv">

❤️

<span>История обращений сохранится в кабинете</span>

</div>

<div class="adv">

📄

<span>Все рекомендации будут доступны онлайн</span>

</div>

</div>

<div class="footer">

© 2025

<b>Сердце под защитой</b>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/config.js"></script>

<script src="../js/auth.js"></script>

</body>

</html>
