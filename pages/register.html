content="width=device-width, initial-scale=1.0">

<title>Регистрация | Сердце под защитой</title>

<body>

<div class="background"></div>

<div class="login">

<div class="card">

<img
src="../assets/images/logo.jpg"
class="logo"
alt="Heart73">

<h1>

Создание аккаунта

</h1>

<p class="subtitle">

На страже вашего здоровья.
Создайте личный кабинет пациента.

</p>

<form id="registerForm">

<div class="input-group">

<label>

Имя и фамилия

</label>

<input

id="name"

type="text"

placeholder="Иван Иванов"

required>

</div>

<div class="input-group">

<label>

Телефон

</label>

<input
    type="tel"
    id="phone"
    placeholder="+7 (999) 123-45-67"
    oninput="formatPhone(this)"
    required>
</div>

<div class="input-group">

<label>

Email

</label>

<input

id="email"

type="email"

placeholder="example@mail.ru"

required>

</div>

<div class="input-group">

<label>

Пароль

</label>

<input

id="password"

type="password"

placeholder="Минимум 6 символов"

required>

</div>

<div class="input-group">

<label>

Повторите пароль

</label>

<input

id="password2"

type="password"

placeholder="Повторите пароль"

required>

</div>

<div class="checkbox">

<input

type="checkbox"

id="agree"

required>

<label for="agree">

Я принимаю условия обработки персональных данных
и согласен с политикой конфиденциальности.

</label>

</div>

<div id="notify" class="notify"></div>

<div class="cf-turnstile"
     data-sitekey="0x4AAAAAADuE2nQg_9SOaVHl">
</div>

<button

id="registerButton"

type="submit">

Создать аккаунт

</button>

</form>

<div class="links">

<a href="login.html">

← Уже есть аккаунт? Войти

</a>

</div>

<hr class="divider">

<div class="footer">

<div>

<span>

Данные надежно защищены

</span>

</div>

<div>

<span>

в личном кабинете

</span>

</div>
<div>

<span>

Все рекомендации врача
будут доступны онлайн

</span>

</div>

<div>

<span>

Консультации доступны
из любой точки мира

</span>

</div>

<b>

Сердце под защитой

</b>

</div>

</div>

</div>

</div>

</body>

</html>
